<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-SmartFarm Pulse - 스마트팜 & 아그리테크 전문 뉴스</title>
  <meta name="description" content="한국의 차세대 스마트팜, IoT 온실 자동화, 도심형 수직농장, 친환경 농업 바이오 기술 및 유통/정부 정책 뉴스를 가장 빠르게 전달하는 전문 애그리게이터입니다.">
  
  <!-- OpenGraph SEO Tags -->
  <meta property="og:title" content="K-SmartFarm Pulse - 스마트팜 & 아그리테크 전문 뉴스">
  <meta property="og:description" content="대한민국 농업의 미래, 스마트팜과 아그리테크 트렌드를 한눈에 확인하는 전문 뉴스 플랫폼.">
  <meta property="og:type" content="website">
  
  <!-- Font Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Header -->
  <header class="main-header">
    <div class="header-container">
      <div class="logo-area">
        <span class="logo-pulse"></span>
        <h1 id="main-logo" class="logo-text">K-SmartFarm<span>Pulse</span></h1>
      </div>
      <div class="header-actions">
        <!-- Simulate Live News Button -->
        <button id="btn-simulate-news" class="btn-action btn-simulate" title="최신 농업 속보 시뮬레이션">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          <span class="btn-label">농업 속보 추가</span>
        </button>
        <!-- Theme Toggle -->
        <button id="btn-theme-toggle" class="btn-action btn-theme" aria-label="테마 전환" title="테마 변경">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <!-- Bookmarks Trigger -->
        <button id="btn-bookmarks-toggle" class="btn-action btn-bookmarks" aria-label="저장한 뉴스코너 열기" title="저장한 기사">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
          <span class="bookmark-count" id="bookmark-badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Controls (Categories & Search) -->
  <section class="controls-section">
    <div class="controls-container">
      <nav class="categories-nav" aria-label="농업 전문 카테고리">
        <button class="category-btn active" data-category="all" id="cat-all">전체</button>
        <button class="category-btn" data-category="iot" id="cat-iot">IoT/자동화</button>
        <button class="category-btn" data-category="vertical" id="cat-vertical">수직농장</button>
        <button class="category-btn" data-category="biotech" id="cat-biotech">친환경/바이오</button>
        <button class="category-btn" data-category="policy" id="cat-policy">정책/유통</button>
      </nav>
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="search" id="input-search" placeholder="스마트팜 뉴스 제목 및 키워드 검색..." aria-label="기사 검색">
      </div>
    </div>
  </section>

  <!-- Main Feed Area -->
  <main class="main-content">
    <div class="feed-container">
      
      <!-- Featured News (Top Spot) -->
      <section id="featured-section" class="featured-section">
        <h2 class="section-title">아그리테크 주요 초점</h2>
        <div id="featured-placeholder" class="featured-grid">
          <!-- Dynamically populated -->
        </div>
      </section>

      <!-- Latest News Grid -->
      <section class="latest-section">
        <div class="section-header">
          <h2 class="section-title">최신 스마트팜 뉴스피드</h2>
          <span class="feed-count-badge" id="feed-count">기사 0개</span>
        </div>
        <div id="news-grid" class="news-grid">
          <!-- Dynamically populated -->
        </div>
        <div id="no-results" class="no-results hidden">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
          <p>일치하는 농업 뉴스가 존재하지 않습니다.</p>
          <button id="btn-reset-filters" class="btn-reset">필터 및 검색 초기화</button>
        </div>
      </section>

    </div>
  </main>

  <!-- Bookmark Sidebar / Drawer -->
  <aside id="bookmark-drawer" class="bookmark-drawer" aria-label="나중에 읽을 기사">
    <div class="drawer-header">
      <h3>저장한 농업 기사</h3>
      <button id="btn-close-drawer" class="btn-close" aria-label="북마크 닫기">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="drawer-content" id="bookmark-list">
      <!-- Bookmarks dynamically loaded -->
    </div>
  </aside>
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- Detail Article Modal -->
  <div id="article-modal" class="modal-overlay" aria-hidden="true" role="dialog">
    <div class="modal-container">
      <button id="btn-close-modal" class="modal-close" aria-label="상세보기 닫기">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
      <article class="modal-article" id="modal-article-content">
        <!-- Dynamically populated -->
      </article>
    </div>
  </div>

  <!-- Footer -->
  <footer class="main-footer">
    <div class="footer-container">
      <p>&copy; 2026 K-SmartFarm Pulse. All rights reserved.</p>
      <div class="footer-meta">
        <span>Designed with Agricultural Green Theme Palette</span>
        <span class="divider">|</span>
        <span>스마트 농업 정보 교류 허브</span>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="newsData.js"></script>
  <script src="app.js"></script>
</body>
</html>
