name: Publish smart farm newsletter

on:
  schedule:
    - cron: "0 22 * * *"
    TZ: Asia/Seoul
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish newsletter to Blogger
        run: npm run newsletter:publish
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          NEWSLETTER_AUTHOR: ${{ vars.NEWSLETTER_AUTHOR || 'AG Smart Farm Brief' }}
          NEWSLETTER_DAYS_BACK: ${{ vars.NEWSLETTER_DAYS_BACK || '2' }}
          NEWSLETTER_MAX_ITEMS: ${{ vars.NEWSLETTER_MAX_ITEMS || '18' }}
          BLOGGER_IS_DRAFT: ${{ vars.BLOGGER_IS_DRAFT || 'false' }}
